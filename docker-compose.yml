version: "3.8"

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: goal_tracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - db
    environment:
      DB_NAME: goal_tracker_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432